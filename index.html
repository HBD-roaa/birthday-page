<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:radial-gradient(ellipse at top,#1a1f35 0%,#080b12 60%);
  overflow-x:hidden;
  font-family:"Segoe UI",Tahoma,sans-serif;
  padding:30px 0 60px;
}
canvas#particles{position:fixed;top:0;left:0;pointer-events:none;z-index:0;}

/* ---- CARD ---- */
.card{
  position:relative;z-index:2;
  width:90%;max-width:580px;
  padding:48px 38px 40px;
  background:rgba(13,17,30,0.88);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;text-align:center;
  backdrop-filter:blur(14px);
  box-shadow:0 30px 70px rgba(0,0,0,0.7);
  animation:fadeUp 1.2s ease both;
  margin:auto;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}

/* ---- CANDLES ---- */
.candle-wrap{margin-bottom:24px;display:flex;justify-content:center;align-items:flex-end;gap:18px;}
.candle{display:flex;flex-direction:column;align-items:center;}
.flame{
  width:14px;height:22px;
  background:radial-gradient(ellipse at 50% 80%,#ffe082,#ffb300 40%,#ff6f00 80%,transparent);
  border-radius:50% 50% 30% 30%;
  animation:flicker 1.6s ease-in-out infinite alternate;
  position:relative;filter:drop-shadow(0 0 6px #ffb30099);
}
.flame::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:6px;height:10px;background:rgba(255,255,255,0.55);border-radius:50%;}
@keyframes flicker{
  0%{transform:scaleX(1) scaleY(1) rotate(-2deg);}
  30%{transform:scaleX(0.88) scaleY(1.06) rotate(1deg);}
  60%{transform:scaleX(1.06) scaleY(0.94) rotate(-1deg);}
  100%{transform:scaleX(0.92) scaleY(1.04) rotate(2deg);}
}
.wick{width:2px;height:8px;background:#555;border-radius:1px;margin-bottom:-1px;}
.candle-body{width:16px;height:56px;background:linear-gradient(135deg,#f8e7d0,#e8c9a0,#c9995a);border-radius:4px 4px 3px 3px;position:relative;overflow:hidden;}
.candle-body::after{content:'';position:absolute;top:0;left:3px;width:3px;height:100%;background:rgba(255,255,255,0.25);border-radius:2px;}

/* ---- HEADING ---- */
h1{font-size:32px;font-weight:700;color:#f5f0e8;letter-spacing:1.5px;margin-bottom:8px;text-shadow:0 0 24px rgba(255,200,80,0.3);}
.line{width:60px;height:1.5px;background:linear-gradient(90deg,transparent,#c09040,transparent);margin:16px auto 20px;}

/* ---- TYPING ---- */
.message{color:#cbd5e1;font-size:18px;line-height:2;direction:rtl;min-height:110px;}
.cursor{display:inline-block;width:2px;height:1.1em;background:#c09040;vertical-align:middle;animation:blink 0.85s step-end infinite;margin-right:2px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.footer{margin-top:24px;color:#94a3b8;font-size:15px;opacity:0;transition:opacity 1s ease;}

/* ---- MUSIC BTN ---- */
.music-btn{
  margin-top:22px;background:transparent;
  border:1px solid rgba(192,144,64,0.45);color:#c09040;
  padding:9px 26px;border-radius:30px;cursor:pointer;
  font-size:14px;letter-spacing:0.5px;transition:all 0.3s ease;opacity:0;
}
.music-btn:hover{background:rgba(192,144,64,0.12);border-color:#c09040;}
.music-btn.playing{color:#ffcc66;border-color:#ffcc66;box-shadow:0 0 14px rgba(255,200,80,0.2);}

/* ---- DIVIDER ---- */
.section-divider{width:100%;height:1px;background:rgba(255,255,255,0.06);margin:28px 0;}

/* ---- COUNTER ---- */
.counter-label{font-size:13px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.counter-grid{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;}
.counter-box{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  border-radius:12px;padding:14px 18px;min-width:70px;
}
.counter-num{font-size:28px;font-weight:700;color:#e2c97e;font-variant-numeric:tabular-nums;line-height:1;}
.counter-unit{font-size:11px;color:#64748b;margin-top:5px;letter-spacing:0.5px;}



/* ---- SECRET MESSAGES ---- */
.secrets-label{
font-size:18px;
color:#e2c97e;
letter-spacing:1.5px;
margin-bottom:18px;
font-weight:600;
}
.secret-dots{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;}
.dot-btn{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  cursor:pointer;font-size:18px;
  transition:all 0.3s ease;color:white;
  display:flex;align-items:center;justify-content:center;
}
.dot-btn:hover{background:rgba(192,144,64,0.15);border-color:#c09040;transform:scale(1.1);}
.dot-btn.revealed{background:rgba(192,144,64,0.12);border-color:#c09040;}
.secret-text{
  margin-top:16px;padding:14px 18px;
  background:rgba(192,144,64,0.07);
  border:1px solid rgba(192,144,64,0.18);
  border-radius:12px;color:#e2c97e;
  font-size:16px;line-height:1.8;direction:rtl;
  min-height:52px;opacity:0;transition:opacity 0.5s ease;
}
.secret-text.show{opacity:1;}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="card">

  <!-- CANDLES -->
  <div class="candle-wrap">
    <div class="candle"><div class="flame"></div><div class="wick"></div><div class="candle-body"></div></div>
    <div class="candle"><div class="flame" style="animation-delay:0.4s"></div><div class="wick"></div><div class="candle-body" style="height:68px"></div></div>
    <div class="candle"><div class="flame" style="animation-delay:0.9s"></div><div class="wick"></div><div class="candle-body" style="height:48px"></div></div>
  </div>

  <h1>Happy Birthday roaa ✨</h1>
  <div class="line"></div>

  <!-- TYPING -->
  <p class="message"><span id="typed"></span><span class="cursor" id="cursor"></span></p>
  <div class="footer" id="footer">Have a great day 🤍</div>
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()">♪ تشغيل الموسيقى</button>

  <!-- COUNTER -->
  <div class="section-divider" id="sec1" style="opacity:0;transition:opacity 1s ease;"></div>
  <div id="counterSection" style="opacity:0;transition:opacity 1s ease;">
    <p class="counter-label">you've been here for</p>
    <div class="counter-grid">
      <div class="counter-box"><div class="counter-num" id="c-y">0</div><div class="counter-unit">سنة</div></div>
      <div class="counter-box"><div class="counter-num" id="c-mo">0</div><div class="counter-unit">شهر</div></div>
      <div class="counter-box"><div class="counter-num" id="c-d">0</div><div class="counter-unit">يوم</div></div>
      <div class="counter-box"><div class="counter-num" id="c-h">0</div><div class="counter-unit">ساعة</div></div>
      <div class="counter-box"><div class="counter-num" id="c-m">0</div><div class="counter-unit">دقيقة</div></div>
      <div class="counter-box"><div class="counter-num" id="c-s">0</div><div class="counter-unit">ثانية</div></div>
    </div>
  </div>

  <!-- SECRET MESSAGES -->
  <div class="section-divider" id="sec3" style="opacity:0;transition:opacity 1s ease;"></div>
  <div id="secretSection" style="opacity:0;transition:opacity 1s ease;">
    <p class="secrets-label">A little message for you — tap a star</p>
    <div class="secret-dots">
      <button class="dot-btn" onclick="revealSecret(0)">🌟</button>
      <button class="dot-btn" onclick="revealSecret(1)">💫</button>
      <button class="dot-btn" onclick="revealSecret(2)">✨</button>
    </div>
    <div class="secret-text" id="secretText"></div>
  </div>

</div>

<script>
/* ===== TYPING ===== */
const fullText = `كنت عايز أقولك كل سنة وانتي طيبة\nومش عارف أعملها إزاي\nفحاولت أعملها بطريقتي\n\nكل سنة وانتي طيبة يا هندسة\nوان شاء الله السنة الجاية تكوني محققة كل اللي تتمنيه ❤️`;
const typedEl = document.getElementById('typed');
const cursorEl = document.getElementById('cursor');
const footer = document.getElementById('footer');
const musicBtn = document.getElementById('musicBtn');
let i = 0;
const SPEED = 55;

function escapeHtml(c){return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function typeNext(){
  if(i < fullText.length){
    const ch = fullText[i];
    typedEl.innerHTML += ch==='\n' ? '<br>' : escapeHtml(ch);
    i++;
    setTimeout(typeNext, ch==='\n' ? SPEED*4 : SPEED);
  } else {
    cursorEl.style.display='none';
    footer.style.opacity='1';
    musicBtn.style.opacity='1';
    setTimeout(showSections, 800);
  }
}
setTimeout(typeNext, 900);

function showSections(){
  ['sec1','counterSection','sec3','secretSection'].forEach((id,idx)=>{
    setTimeout(()=>{ document.getElementById(id).style.opacity='1'; },idx*200);
  });
  startCounter();
}

/* ===== COUNTER ===== */
const BIRTH = new Date('2008-06-15T00:00:00');
function startCounter(){
  function update(){
    const now = new Date();
    let y=now.getFullYear()-BIRTH.getFullYear();
    let mo=now.getMonth()-BIRTH.getMonth();
    let d=now.getDate()-BIRTH.getDate();
    let h=now.getHours()-BIRTH.getHours();
    let m=now.getMinutes()-BIRTH.getMinutes();
    let s=now.getSeconds()-BIRTH.getSeconds();
    if(s<0){s+=60;m--;}
    if(m<0){m+=60;h--;}
    if(h<0){h+=24;d--;}
    if(d<0){
      const prev=new Date(now.getFullYear(),now.getMonth(),0);
      d+=prev.getDate();mo--;
    }
    if(mo<0){mo+=12;y--;}
    document.getElementById('c-y').textContent=y;
    document.getElementById('c-mo').textContent=mo;
    document.getElementById('c-d').textContent=d;
    document.getElementById('c-h').textContent=h;
    document.getElementById('c-m').textContent=m;
    document.getElementById('c-s').textContent=s;
  }
  update();
  setInterval(update,1000);
}

/* ===== SECRET MESSAGES ===== */
const secrets=[
  '',
  'اتمنى الموضوع ميضايقيش او يعمل مشكلة لاني تعبت ف بجد',
  'هانت كلها شهر وتبقي احلى بشمهندسة'
];
let currentSecret=-1;
function revealSecret(idx){
  document.querySelectorAll('.dot-btn').forEach(b=>b.classList.remove('revealed'));
  document.querySelectorAll('.dot-btn')[idx].classList.add('revealed');
  const box=document.getElementById('secretText');
  if(currentSecret===idx){
    box.classList.remove('show');
    currentSecret=-1;
    return;
  }
  box.classList.remove('show');
  setTimeout(()=>{
    box.textContent=secrets[idx];
    box.classList.add('show');
    currentSecret=idx;
  },200);
}

/* ===== PARTICLES ===== */
const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');
let W,H,pts=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const SH=['heart','star','dot'];
const PCOLS=['#ffcc66','#ff88aa','#cc88ff','#88ddff','#ffaa55'];
function heartPath(x,y,s){ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.beginPath();ctx.moveTo(0,-3);ctx.bezierCurveTo(5,-8,10,0,0,8);ctx.bezierCurveTo(-10,0,-5,-8,0,-3);ctx.restore();}
function Pt(){this.x=Math.random()*W;this.y=H+Math.random()*H;this.vx=(Math.random()-0.5)*0.6;this.vy=-(Math.random()*0.8+0.3);this.alpha=Math.random()*0.5+0.4;this.fade=Math.random()*0.003+0.001;this.sz=Math.random()*0.8+0.4;this.sh=SH[Math.floor(Math.random()*3)];this.col=PCOLS[Math.floor(Math.random()*5)];}
for(let k=0;k<60;k++) pts.push(new Pt());
function drawPts(){
  ctx.clearRect(0,0,W,H);
  pts.forEach((p,i)=>{
    ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.col;
    if(p.sh==='heart'){heartPath(p.x,p.y,p.sz);ctx.fill();}
    else if(p.sh==='star'){
      ctx.save();ctx.translate(p.x,p.y);ctx.beginPath();
      for(let k=0;k<5;k++){const a=(k*4*Math.PI)/5-Math.PI/2,b=a+(2*Math.PI)/5;ctx.lineTo(Math.cos(a)*p.sz*8,Math.sin(a)*p.sz*8);ctx.lineTo(Math.cos(b)*p.sz*4,Math.sin(b)*p.sz*4);}
      ctx.closePath();ctx.fill();ctx.restore();
    } else {ctx.beginPath();ctx.arc(p.x,p.y,p.sz*4,0,Math.PI*2);ctx.fill();}
    ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.alpha-=p.fade;
    if(p.alpha<=0||p.y<-30) pts[i]=new Pt();
  });
  requestAnimationFrame(drawPts);
}
drawPts();

/* ===== MUSIC ===== */
let audioCtx,playing=false,loopInt;
function playHB(ac){
  const notes=[
    {f:261.6,d:0.3},{f:261.6,d:0.15},{f:293.7,d:0.45},{f:261.6,d:0.45},{f:349.2,d:0.45},{f:329.6,d:0.9},
    {f:261.6,d:0.3},{f:261.6,d:0.15},{f:293.7,d:0.45},{f:261.6,d:0.45},{f:392.0,d:0.45},{f:349.2,d:0.9},
    {f:261.6,d:0.3},{f:261.6,d:0.15},{f:523.3,d:0.45},{f:440.0,d:0.45},{f:349.2,d:0.45},{f:329.6,d:0.45},{f:293.7,d:0.45},
    {f:466.2,d:0.3},{f:466.2,d:0.15},{f:440.0,d:0.45},{f:349.2,d:0.45},{f:392.0,d:0.45},{f:349.2,d:0.9}
  ];
  let t=ac.currentTime;
  const total=notes.reduce((s,n)=>s+n.d,0);
  notes.forEach(n=>{
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(n.f,t);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.02);
    g.gain.setValueAtTime(0.18,t+n.d*0.8);g.gain.linearRampToValueAtTime(0,t+n.d);
    o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+n.d+0.05);t+=n.d;
  });
  return total*1000;
}
function toggleMusic(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(playing){
    clearInterval(loopInt);audioCtx.suspend();playing=false;
    musicBtn.textContent='♪ تشغيل الموسيقى';musicBtn.classList.remove('playing');
  } else {
    audioCtx.resume();const dur=playHB(audioCtx);playing=true;
    musicBtn.textContent='■ إيقاف الموسيقى';musicBtn.classList.add('playing');
    loopInt=setInterval(()=>{if(playing)playHB(audioCtx);},dur+600);
  }
}
</script>
</body>
</html>
